spring.datasource.url=jdbc:postgresql://localhost:5432/atlas_db
spring.datasource.username=atlas_user
spring.datasource.password=atlas_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Required for data.sql to run after JPA creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jackson.serialization.write-dates-as-timestamps=false

server.port=8080

# JWT configuration
atlas.jwt.secret=AtlasTurboEmsKigaliRwanda2025SuperSecretKeyForJwtTokenSigning
atlas.jwt.expiration=86400000
