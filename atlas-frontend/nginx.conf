server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver — resolves service names at request time
    # (not at startup, which prevents "host not found" when backend starts slowly)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy all /api requests to the Spring Boot backend container
    location /api {
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React Router — serve index.html for every non-file route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
